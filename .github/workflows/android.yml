name: Build NullAvatar APK

# 触发条件
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  # 最核心的开关：允许你在网页端手动点击按钮触发编译
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取源码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 配置 Java 17 环境 (当前主流 Android 开发标配)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Gradle 缓存 (大幅提升编译速度)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 修复 gradlew 的执行权限 (防止 Windows 传上来的文件丢失 x 权限报错)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 执行编译指令 (同时打 Debug 和 Release 包)
      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      # 6. 提取并上传 Debug 包供你下载
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NullAvatar-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # 7. 提取并上传 Release 包供你下载 (未签名或使用默认测试签名)
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NullAvatar-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
